# MergeCraft SFT Configuration
model:
  name: Qwen/Qwen2.5-7B-Coder-Instruct
  torch_dtype: bfloat16

lora:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: none

training:
  output_dir: checkpoints/sft
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-4
  bf16: true
  gradient_checkpointing: true
  max_seq_length: 8192
  dataset_text_field: text
  logging_steps: 25
  report_to: none
  run_name: mergecraft-sft

deepspeed: training/configs/deepspeed_zero3.json
